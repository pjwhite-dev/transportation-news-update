name: Daily Transportation Raw News Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: daily-transportation-raw-news
  cancel-in-progress: false

jobs:
  collect-daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect preceding 24-hour raw news feed
        run: python daily_update.py

      - name: Commit the raw feed safely
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/generated-raw-news
          mkdir -p /tmp/generated-raw-news/raw_archive
          cp data/latest_raw_news.json /tmp/generated-raw-news/latest_raw_news.json
          if [ -d data/raw_archive ]; then
            cp -a data/raw_archive/. /tmp/generated-raw-news/raw_archive/
          fi

          for attempt in 1 2 3 4; do
            echo "Save attempt ${attempt}..."
            git fetch origin main
            git reset --hard origin/main

            mkdir -p data/raw_archive
            cp /tmp/generated-raw-news/latest_raw_news.json data/latest_raw_news.json
            cp -a /tmp/generated-raw-news/raw_archive/. data/raw_archive/

            git add data/latest_raw_news.json data/raw_archive/

            if git diff --cached --quiet; then
              echo "The raw feed is already current."
              exit 0
            fi

            git commit -m "Daily raw news collection $(date -u +%Y-%m-%d)"

            if git push origin HEAD:main; then
              echo "Raw feed committed successfully."
              exit 0
            fi

            echo "Main changed during the push; retrying."
            sleep $((attempt * 2))
          done

          echo "Unable to save the raw feed after four attempts."
          exit 1
